name: TCK Report

on: [pull_request]

jobs:
  tck-report:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ python3

    - name: Build
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --target tck_tests -j$(nproc)

    - name: Run TCK tests
      run: |
        python3 tests/tck/run_tck.py \
          --server-bin build/eugraph-server \
          --tck-bin build/tests/tck/tck_tests \
          --features tests/tck/features \
          --timeout 120 \
          --report tck-report.md

    - name: Post report to PR
      uses: marocchino/sticky-pull-request-comment@v2
      if: always()
      with:
        path: tck-report.md
        header: tck-report
